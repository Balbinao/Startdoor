<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body style="margin:0; padding:0; background-color:#121212; font-family:Arial, Helvetica, sans-serif;">
  <table role="presentation" style="width:100%; max-width:600px; margin:0 auto; padding:32px 24px; background-color:#1f1f1f; border-radius:12px;">
    <tr>
      <td style="text-align:center; padding-bottom:32px;">
        <img th:src="${bannerBase64}" alt="Startdoor" style="max-width:200px; height:auto;" />
      </td>
    </tr>
    <tr>
      <td style="padding-bottom:8px;">
        <h2 style="color:#dfdfdf; text-align:center; margin:0; font-size:22px;">Recuperação de Senha</h2>
      </td>
    </tr>
    <tr>
      <td style="padding-bottom:24px;">
        <p style="color:#999999; text-align:center; font-size:15px; line-height:1.5; margin:0;">
          Você solicitou a redefinição de senha. Utilize o código abaixo para criar uma nova senha:
        </p>
      </td>
    </tr>
    <tr>
      <td style="text-align:center; padding:24px 0;">
        <table role="presentation" style="display:inline-block; background-color:#2b2b38; border-radius:8px; padding:20px 32px;">
          <tr>
            <td style="font-size:36px; letter-spacing:8px; font-weight:bold; color:#d199ff; text-align:center; font-family:monospace;">
              <span th:text="${codigo}">123456</span>
            </td>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <td style="padding-bottom:24px;">
        <p style="color:#999999; text-align:center; font-size:14px; margin:0;">
          Código válido por <strong style="color:#dfdfdf;">15 minutos</strong>.
        </p>
      </td>
    </tr>
    <tr>
      <td>
        <hr style="border:none; border-top:1px solid #2b2b38; margin:24px 0;" />
      </td>
    </tr>
    <tr>
      <td>
        <p style="color:#6a6a6a; font-size:12px; text-align:center; margin:0;">
          Se você não solicitou esta recuperação, ignore este email.
        </p>
      </td>
    </tr>
  </table>
</body>
</html>
