<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 193.63" width="100%" role="img" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Ícone Startdoor</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Quadrado com S tipográfico ao fundo e constelação em S na frente</desc>

  <defs>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#aaaaee"/>
    </linearGradient>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d2d6b"/>
      <stop offset="100%" stop-color="#4a3f8f"/>
    </linearGradient>
    <clipPath id="sq">
      <rect x="0" y="0" width="150" height="150" rx="18"/>
    </clipPath>
  </defs>

  <!-- Quadrado — mesmas proporções do banner (150x150) -->
  <rect x="0" y="0" width="150" height="150" rx="18" fill="url(#bg1)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- S tipográfico ao fundo — mesmas coordenadas do banner, apenas subtraindo o offset do quadrado (x-44, y-35) -->
  <g clip-path="url(#sq)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <text x="-22" y="143" font-family="Georgia, serif" font-size="185" font-weight="700" fill="none" stroke="#4a4aaa" stroke-width="2" opacity="0.35" style="fill:none;stroke:rgb(74, 74, 170);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.35;font-family:Georgia, serif;font-size:185px;font-weight:700;text-anchor:start;dominant-baseline:auto">S</text>
    <text x="-22" y="143" font-family="Georgia, serif" font-size="185" font-weight="700" fill="#2a2a6a" opacity="0.5" style="fill:rgb(42, 42, 106);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:Georgia, serif;font-size:185px;font-weight:700;text-anchor:start;dominant-baseline:auto">S</text>
  </g>

  <!-- Constelação — mesmas coordenadas do banner menos offset (44,35) -->
  <circle cx="89" cy="22" r="3" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="75" cy="18" r="3" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
